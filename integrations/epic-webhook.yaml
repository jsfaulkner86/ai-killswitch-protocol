# AI Kill Switch Protocol — Epic EHR Webhook Configuration
# The Faulkner Group | Version 1.0.0 | 2026-04-06
# Compliance: ONC HTI-1, HL7 FHIR R4, HIPAA 45 CFR 164.312

metadata:
  config_id: AKSP-EPIC-WEBHOOK-001
  version: "1.0.0"
  effective_date: "2026-04-06"
  owner: "The Faulkner Group"
  classification: "RESTRICTED — Clinical Safety Critical"

---

epic_connection:
  vendor: "Epic Systems Corporation"
  api_standard: "FHIR R4"
  base_url: "${EPIC_FHIR_BASE_URL}"          # Injected at runtime — never hardcoded
  auth_method: "OAuth 2.0 SMART on FHIR"
  client_id: "${EPIC_CLIENT_ID}"
  client_secret_ref: "vault://aksp/epic/client-secret"  # HashiCorp Vault reference
  token_endpoint: "${EPIC_TOKEN_ENDPOINT}"
  scopes:
    - "patient/*.read"
    - "observation.read"
    - "encounter.read"
    - "condition.read"
    - "medicationadministration.read"
  tls_version: "TLS 1.3"
  certificate_pinning: true

---

webhook_subscriptions:

  - subscription_id: "sub-001"
    name: "Sepsis Risk Feed — ICU"
    fhir_subscription_resource: "Subscription"
    criteria: "Observation?category=vital-signs&patient.location=ICU"
    channel_type: "rest-hook"
    endpoint: "${AKSP_WEBHOOK_RECEIVER_URL}/epic/vitals"
    payload_type: "application/fhir+json"
    filters:
      - "patient.active=true"
    retry_policy:
      max_retries: 3
      backoff_ms: [500, 1000, 2000]
    on_failure: "log_and_trigger_FSV-006"

  - subscription_id: "sub-002"
    name: "Encounter Events — ED"
    criteria: "Encounter?status=in-progress,arrived&location.type=ED"
    channel_type: "rest-hook"
    endpoint: "${AKSP_WEBHOOK_RECEIVER_URL}/epic/encounters"
    payload_type: "application/fhir+json"
    retry_policy:
      max_retries: 3
      backoff_ms: [500, 1000, 2000]
    on_failure: "log_and_trigger_FSV-006"

---

kill_switch_integration:
  on_halt_event:
    action: "graceful_disconnect_notify_epic"
    epic_notification_endpoint: "${EPIC_FHIR_BASE_URL}/Subscription/$notify"
    notification_payload:
      status: "off"
      reason: "AKSP Kill Switch Event — see audit log"
  reconnect_on_reinstatement: true
  reconnect_validation_required: true
  reconnect_validation_ref: "/digital-twins/fhir-sync-validation.yaml"

---

audit_requirements:
  log_all_requests: true
  log_destination: "/governance/audit-logs/epic-webhook/"
  pii_fields_masked_in_logs: ["patient.name", "patient.dob", "patient.ssn"]
  retention_policy_ref: "/governance/data-retention-policy.md"
