# AI Kill Switch Protocol — Watchdog Service Definition
# The Faulkner Group | Version 1.0.0 | 2026-04-06
# Compliance: FDA 21 CFR Part 11, ISO 13485:2016 Section 7.1

metadata:
  service_id: AKSP-WATCHDOG-001
  version: "1.0.0"
  effective_date: "2026-04-06"
  owner: "The Faulkner Group"
  classification: "RESTRICTED — Clinical Safety Critical"
  description: |
    The Watchdog Service continuously monitors all registered agents and digital
    twins. It is the primary automated enforcement layer for Tier 0 kill switch
    triggers and operates in an isolated process that cannot be halted by agents
    it monitors.

---

watchdog_service:
  process_name: "aksp-watchdog"
  isolation_level: "separate_process"
  persistence: "always_on"
  health_check_interval_ms: 500
  log_destination: "/governance/audit-logs/watchdog/"
  alert_channel: "pagerduty + siem"

---

monitored_metrics:

  per_agent:
    - metric: confidence_score
      source: "agent output metadata"
      check_frequency_ms: 500
      action_on_breach: "trigger AT-001 (immediate_halt)"

    - metric: output_coherence
      source: "semantic contradiction checker"
      check_frequency_ms: 1000
      action_on_breach: "trigger AT-002 (hallucination_detection halt)"

    - metric: response_latency_ms
      source: "agent API response time"
      check_frequency_ms: 1000
      threshold_ms: 5000
      consecutive_breaches_before_halt: 3
      action_on_breach: "trigger AT-007 (graceful_halt)"

    - metric: iteration_count
      source: "agent execution loop counter"
      check_frequency_ms: 200
      max_iterations: 50
      action_on_breach: "trigger AT-008 (runaway loop halt)"

    - metric: scope_boundary_violation
      source: "action permission checker"
      check_frequency_ms: 100
      action_on_breach: "trigger AT-006 (immediate_halt_security_alert)"

  per_digital_twin:
    - metric: fhir_sync_status
      source: "/integrations/fhir-r4-client.py validation output"
      check_frequency_ms: 30000
      consecutive_failures_before_halt: 2
      action_on_breach: "trigger AT-003 (suspend_twin_updates)"

    - metric: model_drift_psi
      source: "/digital-twins/drift-detection.py"
      check_frequency_hours: 1
      action_on_breach: "trigger AT-004 (suspend_twin_inference)"

  per_iot_stream:
    - metric: physiological_plausibility
      source: "/integrations/iot-validator.py"
      check_frequency_ms: 1000
      action_on_breach: "trigger AT-005 (quarantine_stream_halt_dependent_agents)"

---

watchdog_states:
  MONITORING:
    description: "Normal — all agents within bounds"
  ALERT:
    description: "Breach detected — halt trigger initiated"
  HALT_ENFORCED:
    description: "Agent/twin halted — elevated monitoring mode"
  SUPERVISED_RESTART:
    description: "Agent restarted under enhanced scrutiny (30 min window)"
    monitoring_interval_multiplier: 2
    auto_rehalt_on_any_breach: true

---

watchdog_failure_handling:
  on_watchdog_crash:
    action: "auto_restart_and_alert"
    max_restart_attempts: 3
    alert_on_failure: ["cmio", "cio", "security_siem"]
  on_persistent_failure:
    action: "halt_all_monitored_agents_as_precaution"
    notify: ["cmio", "cio"]
    rationale: "Unmonitored agents cannot operate safely in clinical environments"
